openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: LeetCode Tracker API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: follows
    description: Follow/unfollow LeetCode profiles
  - name: notifications
    description: In-app notifications
  - name: activity
    description: Activity feed for followed profiles
  - name: profiles
    description: LeetCode profile data
  - name: preferences
    description: User email digest preferences
  - name: push
    description: Push notification management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /follows:
    get:
      operationId: listFollows
      tags: [follows]
      summary: List all LeetCode profiles the current user follows
      responses:
        "200":
          description: List of follows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Follow"
        "401":
          description: Unauthorized
    post:
      operationId: createFollow
      tags: [follows]
      summary: Follow a LeetCode username
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFollowBody"
      responses:
        "201":
          description: Follow created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Follow"
        "400":
          description: Invalid username or already following
        "401":
          description: Unauthorized

  /follows/{id}:
    delete:
      operationId: deleteFollow
      tags: [follows]
      summary: Unfollow a LeetCode profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Unfollowed successfully
        "404":
          description: Follow not found
        "401":
          description: Unauthorized

  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications for the current user
      parameters:
        - name: unreadOnly
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: List of notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"
        "401":
          description: Unauthorized

  /notifications/read-all:
    put:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: All marked as read
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required:
                  - success
        "401":
          description: Unauthorized

  /notifications/{id}/read:
    put:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a single notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Notification marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"
        "404":
          description: Notification not found
        "401":
          description: Unauthorized

  /activity:
    get:
      operationId: listActivity
      tags: [activity]
      summary: Recent problems solved by followed users
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: myUsername
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Activity list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityFeedItem"
        "401":
          description: Unauthorized

  /activity/stats:
    get:
      operationId: getActivityStats
      tags: [activity]
      summary: Aggregate activity stats for today and this week
      responses:
        "200":
          description: Activity stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityStats"
        "401":
          description: Unauthorized

  /activity/leaderboard:
    get:
      operationId: getLeaderboard
      tags: [activity]
      summary: Followed users ranked by weekly solve count
      parameters:
        - name: scope
          in: query
          required: false
          schema:
            type: string
            enum: [following, global]
        - name: period
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Leaderboard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"
        "401":
          description: Unauthorized

  /preferences:
    get:
      operationId: getPreferences
      tags: [preferences]
      summary: Get user email digest preferences
      responses:
        "200":
          description: Preferences data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Preferences"
        "401":
          description: Unauthorized
    put:
      operationId: updatePreferences
      tags: [preferences]
      summary: Update user email digest preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePreferencesBody"
      responses:
        "200":
          description: Preferences updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Preferences"
        "401":
          description: Unauthorized

  /preferences/verify:
    post:
      operationId: verifyLeetcodeUsername
      tags: [preferences]
      summary: Verify ownership of the LeetCode username via bio token
      responses:
        "200":
          description: Verification successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Preferences"
        "400":
          description: Verification failed (token not found or profile private)
        "401":
          description: Unauthorized

  /push/vapid-public-key:
    get:
      operationId: getVapidPublicKey
      tags: [push]
      summary: Get VAPID public key for push notifications
      responses:
        "200":
          description: VAPID public key
          content:
            application/json:
              schema:
                type: object
                properties:
                  publicKey:
                    type: string
                required: [publicKey]

  /push/subscribe:
    post:
      operationId: savePushSubscription
      tags: [push]
      summary: Subscribe to push notifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SavePushSubscriptionBody"
      responses:
        "200":
          description: Subscribed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushSubscribeResponse"
        "401":
          description: Unauthorized
    delete:
      operationId: deletePushSubscription
      tags: [push]
      summary: Unsubscribe from push notifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeletePushSubscriptionBody"
      responses:
        "200":
          description: Unsubscribed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushSubscribeResponse"

  /push/mock:
    post:
      operationId: sendMockNotification
      tags: [push]
      summary: Send a mock push notification for testing
      responses:
        "200":
          description: Mock notification sent
        "401":
          description: Unauthorized

  /profiles/{username}:
    get:
      operationId: getLeetcodeProfile
      tags: [profiles]
      summary: Get a LeetCode profile with recent solved problems and following list
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Profile data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeetcodeProfile"
        "404":
          description: Profile not found

  /profiles/{username}/db-summary:
    get:
      operationId: getDbProfileSummary
      tags: [profiles]
      summary: DB-only profile summary
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
        - name: period
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Profile summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DbProfileSummary"
        "404":
          description: Profile not found in DB

  /profiles/{username}/heatmap:
    get:
      operationId: getProfileHeatmap
      tags: [profiles]
      summary: Get daily solve counts for the last 365 days
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Heatmap data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HeatmapDataPoint"

  /profiles/{username}/save:
    post:
      operationId: saveProfileToDb
      tags: [profiles]
      summary: Fetch and save profile to DB (no follow)
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Profile saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DbProfileSummary"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Follow:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        leetcodeUsername:
          type: string
        displayName:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        totalSolved:
          type: ["integer", "null"]
        lastPolledAt:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - userId
        - leetcodeUsername
        - createdAt

    CreateFollowBody:
      type: object
      properties:
        leetcodeUsername:
          type: string
      required:
        - leetcodeUsername

    Notification:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        message:
          type: string
        type:
          type: string
        leetcodeUsername:
          type: ["string", "null"]
        problemTitle:
          type: ["string", "null"]
        problemSlug:
          type: ["string", "null"]
        difficulty:
          type: ["string", "null"]
        submissionId:
          type: ["string", "null"]
        read:
          type: boolean
        solvedAt:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - userId
        - message
        - type
        - read
        - createdAt

    SolvedProblem:
      type: object
      properties:
        id:
          type: integer
        leetcodeUsername:
          type: string
        problemSlug:
          type: string
        problemTitle:
          type: string
        difficulty:
          type: string
        solvedAt:
          type: string
        titleSlug:
          type: ["string", "null"]
        submissionId:
          type: ["string", "null"]
      required:
        - id
        - leetcodeUsername
        - problemSlug
        - problemTitle
        - difficulty
        - solvedAt

    ActivityFeedItem:
      allOf:
        - $ref: "#/components/schemas/SolvedProblem"
        - type: object
          properties:
            avatarUrl:
              type: ["string", "null"]
            displayName:
              type: ["string", "null"]

    ActivityStats:
      type: object
      properties:
        solvedToday:
          type: integer
        solvedThisWeek:
          type: integer
        topDifficulty:
          type: string
        mostActiveUser:
          type: ["string", "null"]
        mostActiveDisplayName:
          type: ["string", "null"]
      required:
        - solvedToday
        - solvedThisWeek
        - topDifficulty

    LeaderboardEntry:
      type: object
      properties:
        leetcodeUsername:
          type: string
        displayName:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        solvedInPeriod:
          type: integer
        totalSolved:
          type: ["integer", "null"]
      required:
        - leetcodeUsername
        - solvedInPeriod

    LeetcodeFollowingEntry:
      type: object
      properties:
        username:
          type: string
        displayName:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
      required:
        - username

    LeetcodeProfile:
      type: object
      properties:
        leetcodeUsername:
          type: string
        displayName:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        totalSolved:
          type: ["integer", "null"]
        easySolved:
          type: ["integer", "null"]
        mediumSolved:
          type: ["integer", "null"]
        hardSolved:
          type: ["integer", "null"]
        recentProblems:
          type: array
          items:
            $ref: "#/components/schemas/SolvedProblem"
        following:
          type: array
          items:
            $ref: "#/components/schemas/LeetcodeFollowingEntry"
      required:
        - leetcodeUsername
        - recentProblems
        - following

    DbProfileSummary:
      type: object
      properties:
        leetcodeUsername:
          type: string
        displayName:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        totalSolved:
          type: ["integer", "null"]
        solvedInPeriod:
          type: integer
        inDatabase:
          type: boolean
        recentSlugs:
          type: array
          items:
            type: string
      required:
        - leetcodeUsername
        - solvedInPeriod
        - inDatabase

    Preferences:
      type: object
      properties:
        userId:
          type: string
        emailEnabled:
          type: boolean
        digestHour:
          type: integer
        digestMinute:
          type: integer
        lastDigestAt:
          type: ["string", "null"]
        updatedAt:
          type: string
        leetcodeUsername:
          type: ["string", "null"]
        isVerified:
          type: boolean
        verificationToken:
          type: ["string", "null"]
        onboardingCompleted:
          type: boolean
      required:
        - userId
        - emailEnabled
        - digestHour
        - digestMinute
        - updatedAt

    UpdatePreferencesBody:
      type: object
      properties:
        emailEnabled:
          type: boolean
        digestHour:
          type: integer
        digestMinute:
          type: integer
        leetcodeUsername:
          type: ["string", "null"]
        onboardingCompleted:
          type: boolean

    SavePushSubscriptionBody:
      type: object
      properties:
        endpoint:
          type: string
        p256dh:
          type: string
        auth:
          type: string
      required:
        - endpoint
        - p256dh
        - auth

    DeletePushSubscriptionBody:
      type: object
      properties:
        endpoint:
          type: string
      required:
        - endpoint

    HeatmapDataPoint:
      type: object
      properties:
        date:
          type: string
        count:
          type: integer
      required:
        - date
        - count

    PushSubscribeResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success
