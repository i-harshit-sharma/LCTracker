name: Automated Deployment and Versioning

on:
  push:
    branches:
      - main

jobs:
  deploy-and-version:
    name: Deploy and Bump Version
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump Minor Version
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # Call the shell script directly to skip pnpm install overhead
          bash ./scripts/version-bump.sh minor --push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Deployment Request
        run: |
          curl -N -X POST "${{ secrets.DEPLOY_API_URL }}/api/admin/deploy" \
            -H "Content-Type: application/json" \
            -H "x-deploy-secret: ${{ secrets.DEPLOY_SECRET }}"
          echo -e "\nDeployment request completed."
