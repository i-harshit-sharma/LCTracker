name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - run: pnpm install --no-frozen-lockfile

      # 1. Lint & Typecheck
      - run: pnpm run lint
      - run: pnpm -r exec tsc --noEmit

      # 2. Contract Check
      - run: pnpm run generate:api
      - run: git diff --exit-code

      # 3. Unit Tests
      - run: pnpm run test:unit

      # 4. E2E Tests
      - run: docker-compose up -d postgres
      - run: pnpm run test:e2e

  deploy:
    name: Deploy to Production
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump Minor Version
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # Call the shell script directly to skip pnpm install overhead
          bash ./scripts/version-bump.sh minor --push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Deployment Request
        run: |
          curl -N -X POST "${{ secrets.DEPLOY_API_URL }}/api/admin/deploy" \
            -H "Content-Type: application/json" \
            -H "x-deploy-secret: ${{ secrets.DEPLOY_SECRET }}"
          echo -e "\nDeployment request completed."
