name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # STEP 1: Setup & Validation (Lint, Types, Contract)
  validate:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - run: pnpm install --no-frozen-lockfile

      - name: Linting
        run: pnpm run lint

      - name: Build Libraries (Dependencies)
        run: pnpm run typecheck:libs

      - name: Full Typecheck
        run: pnpm run typecheck

      - name: Contract Check (API Generation)
        run: |
          pnpm run generate:api
          git diff --exit-code

  unit-test:
    name: Unit Tests
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm run test:unit

  e2e-test:
    name: E2E Tests
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - run: pnpm install --no-frozen-lockfile

      # - name: Start Database
      #   run: docker-compose up -d postgres

      - name: Run E2E
        run: pnpm run test:e2e

  # STEP 4: Deployment
  deploy:
    name: Deploy to Production
    needs: [unit-test, e2e-test] # Must pass all tests first
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump Minor Version
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          bash ./scripts/version-bump.sh minor --push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Deployment Request
        run: |
          curl -N -X POST "${{ secrets.DEPLOY_API_URL }}/api/admin/deploy" \
            -H "Content-Type: application/json" \
            -H "x-deploy-secret: ${{ secrets.DEPLOY_SECRET }}"
